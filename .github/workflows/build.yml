name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx next build

  sql-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic SQL file presence
        run: |
          test -f sql/ddl/01_schemas.sql
          test -f sql/ddl/02_bronze_tables.sql
          test -f sql/ddl/03_silver_views.sql
          test -f sql/ddl/04_mart_alerts.sql
          for f in sql/rules/R*.sql; do test -f "$f"; done
          for f in sql/marts/*.sql; do test -f "$f"; done
          echo "all SQL files present"
